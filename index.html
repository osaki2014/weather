<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>雨雲レーダー・天気図・時系列グラフ 3D地図面つき雲頂強調版</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#fff; --ink:#1f2937; --muted:#64748b; --line:#dbe3ef; --accent:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:16px 20px;background:linear-gradient(90deg,#eff6ff,#fff);border-bottom:1px solid var(--line)}
    h1{font-size:20px;margin:0 0 6px} .note{font-size:13px;color:var(--muted);line-height:1.55}
    main{padding:14px;display:grid;gap:14px}
    .toolbar,.sliderBox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 3px 12px #00000008}
    .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    label{font-size:13px;color:#334155} select,input[type="checkbox"]{font-size:14px} select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:white}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 3px 12px #00000008}
    .cardHead{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
    .cardHead h2{font-size:16px;margin:0}.status{font-size:12px;color:var(--muted);text-align:right}
    .map{height:48vh;min-height:360px;background:#dbeafe}
    .chartWrap{height:260px;padding:10px}
    input[type="range"]{width:100%}.timeLabel{font-weight:700;color:var(--accent)}
    .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px}.chip{display:inline-flex;align-items:center;gap:5px}.sw{width:18px;height:3px;border-radius:999px;background:#999}.sw.temp{background:#ef4444}.sw.hum{background:#2563eb}.sw.rain{background:#0ea5e9}
    .leaflet-control-attribution{font-size:10px}.error{color:#b91c1c;font-size:13px;white-space:pre-wrap}
    .leaflet-pane.rain-pane-strong img{filter:saturate(2.8) contrast(2.2) brightness(1.08)}
    .leaflet-pane.rain-nd-pane img{filter:contrast(1.15) brightness(1.05)}
    .leaflet-pane.wx-pane img{filter:saturate(1.05) contrast(1.05)}
    .leaflet-pane.himawari-vis-pane img{filter:grayscale(0.10) contrast(1.25) brightness(1.08)}
    .leaflet-pane.himawari-cloud-pane img{filter:saturate(1.25) contrast(1.18) brightness(1.02)}
    .value{display:inline-block;min-width:3.2em;text-align:right;color:#2563eb;font-weight:700}
    .wideLabel{min-width:240px}
    .obs-dot{background:#ef4444;border:3px solid #fff;border-radius:999px;box-shadow:0 0 0 2px #11182755}
    .obs-label{background:#ffffffee;border:1px solid #94a3b8;border-radius:6px;padding:2px 6px;font-size:12px;font-weight:700;color:#1f2937;box-shadow:0 2px 8px #00000022;white-space:nowrap}

    .threeWrap{height:520px;min-height:420px;background:linear-gradient(180deg,#e0f2fe,#f8fafc);position:relative}
    #cloud3dCanvas{width:100%;height:100%;display:block}
    .threeControls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--line);background:#ffffffdd}
    .threeStatus{font-size:12px;color:var(--muted);padding:8px 12px;border-top:1px solid var(--line);background:#fff;white-space:pre-wrap}
    .smallBtn{padding:6px 10px;border:1px solid #94a3b8;border-radius:8px;background:#fff;cursor:pointer}
    .smallBtn:hover{background:#eff6ff}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.map{height:45vh}.threeWrap{height:420px}}
  </style>
</head>
<body>
<header>
  <h1>雨雲レーダー・気象庁天気図・温度湿度降雨量グラフ</h1>
  <div class="note">左は日本全体、右は選択地域を表示します。トラックバーを動かすと、グラフの縦線・雨雲レーダー・天気図をその時刻に近いデータへ切り替えます。</div>
</header>
<main>
  <section class="toolbar">
    <label>右側の地域：
      <select id="regionSelect">
        <option value="kagawa">香川県・高松</option>
        <option value="tokyo">東京都心</option>
        <option value="osaka">大阪</option>
        <option value="koch">高知</option>
        <option value="fukuoka">福岡</option>
        <option value="sapporo">札幌</option>
        <option value="okinawa">那覇</option>
      </select>
    </label>
    <label><input id="rainToggle" type="checkbox" checked> 雨雲レーダー</label>
    <label><input id="chartToggle" type="checkbox" checked> 気象庁天気図</label>
    <label><input id="himawariVisibleToggle" type="checkbox"> ひまわり可視</label>
    <label><input id="himawariCloudTopToggle" type="checkbox"> ひまわり雲頂強調</label>
    <label>衛星透明度 <input id="himawariOpacity" type="range" min="0" max="1" step="0.05" value="0.55"></label>
    <label>雨雲透明度 <input id="rainOpacity" type="range" min="0" max="1" step="0.05" value="1"></label>
    <label>天気図透明度 <input id="wxOpacity" type="range" min="0" max="1" step="0.05" value="0.34"></label>
    <label class="wideLabel">天気図 横倍率 <span id="wxScaleXVal" class="value">0.70</span><input id="wxScaleX" type="range" min="0.40" max="3.50" step="0.01" value="0.70"></label>
    <label class="wideLabel">天気図 縦倍率 <span id="wxScaleYVal" class="value">0.70</span><input id="wxScaleY" type="range" min="0.40" max="3.50" step="0.01" value="0.70"></label>
    <label class="wideLabel">天気図 東西位置 <span id="wxLonOffsetVal" class="value">-1.4</span><input id="wxLonOffset" type="range" min="-12" max="12" step="0.1" value="-1.4"></label>
    <label class="wideLabel">天気図 南北位置 <span id="wxLatOffsetVal" class="value">-2.0</span><input id="wxLatOffset" type="range" min="-12" max="12" step="0.1" value="-2.0"></label>
    <label class="wideLabel">天気図 回転角 <span id="wxRotateVal" class="value">0.0</span><input id="wxRotate" type="range" min="-15" max="15" step="0.1" value="0"></label>
    <button id="wxResetBtn" type="button">天気図位置リセット</button>
    <label><input id="rainEnhance" type="checkbox" checked> 雨雲を強調</label>
    <label>雨雲表示：
      <select id="radarMode">
        <option value="both" selected>降水＋欠測域</option>
        <option value="hrpns">降水のみ</option>
        <option value="hrpns_nd">欠測域のみ</option>
      </select>
    </label>
    <button id="reloadBtn">再読み込み</button>
  </section>

  <section class="sliderBox">
    <div>選択時刻：<span class="timeLabel" id="selectedTime">読み込み中...</span></div>
    <input id="timeSlider" type="range" min="0" max="0" value="0" step="1" disabled>
    <div class="legend">
      <span class="chip"><span class="sw temp"></span>気温 ℃</span>
      <span class="chip"><span class="sw hum"></span>湿度 %</span>
      <span class="chip"><span class="sw rain"></span>降水量 mm/h</span>
    </div>
    <div id="errorBox" class="error"></div>
    <div id="debugBox" class="note"></div>
  </section>

  <section class="grid">
    <div class="card">
      <div class="cardHead"><h2>日本全土</h2><div class="status" id="jpStatus"></div></div>
      <div id="mapJapan" class="map"></div>
      <div class="chartWrap"><canvas id="chartJapan"></canvas></div>
    </div>
    <div class="card">
      <div class="cardHead"><h2 id="regionTitle">香川県・高松</h2><div class="status" id="regStatus"></div></div>
      <div id="mapRegion" class="map"></div>
      <div class="chartWrap"><canvas id="chartRegion"></canvas></div>
    </div>
  </section>

  <section class="card">
    <div class="cardHead"><h2>3D雲頂強調画像</h2><div class="status" id="cloud3dHeadStatus">雲頂強調画像の色を高さに変換して立体表示します</div></div>
    <div class="threeControls">
      <label>3D対象：
        <select id="cloud3dTarget">
          <option value="region" selected>右側の地域地図</option>
          <option value="japan">日本全体地図</option>
        </select>
      </label>
      <label class="wideLabel">高さ倍率 <span id="cloud3dHeightScaleVal" class="value">55</span><input id="cloud3dHeightScale" type="range" min="5" max="160" step="1" value="55"></label>
      <label class="wideLabel">解像度 <span id="cloud3dResolutionVal" class="value">96</span><input id="cloud3dResolution" type="range" min="48" max="180" step="4" value="96"></label>
      <label><input id="cloud3dWireToggle" type="checkbox"> ワイヤー表示</label>
      <label class="wideLabel">雲画像透明度 <span id="cloud3dOpacityVal" class="value">0.68</span><input id="cloud3dOpacity" type="range" min="0.15" max="1" step="0.01" value="0.68"></label>
      <label class="wideLabel">地図透明度 <span id="cloud3dBaseOpacityVal" class="value">1.00</span><input id="cloud3dBaseOpacity" type="range" min="0" max="1" step="0.01" value="1.00"></label>
      <button id="buildCloud3dBtn" type="button" class="smallBtn">現在時刻で3D作成</button>
      <button id="resetCloud3dViewBtn" type="button" class="smallBtn">3D視点リセット</button>
    </div>
    <div class="threeWrap"><div id="cloud3dCanvas"></div></div>
    <div id="cloud3dStatus" class="threeStatus">「現在時刻で3D作成」を押すと、高さ0の地図面の上に、透過した雲頂強調画像を3Dメッシュとして重ねます。</div>
  </section>

</main>

<script>
const REGIONS = {
  kagawa:{name:'香川県・高松', lat:34.3428, lon:134.0466, zoom:8},
  tokyo:{name:'東京都心', lat:35.6812, lon:139.7671, zoom:8},
  osaka:{name:'大阪', lat:34.6937, lon:135.5023, zoom:8},
  koch:{name:'高知', lat:33.5597, lon:133.5311, zoom:8},
  fukuoka:{name:'福岡', lat:33.5902, lon:130.4017, zoom:8},
  sapporo:{name:'札幌', lat:43.0618, lon:141.3545, zoom:8},
  okinawa:{name:'那覇', lat:26.2124, lon:127.6792, zoom:8}
};
const JAPAN_POINT = {name:'日本全土の代表点（東京）', lat:35.6812, lon:139.7671};
const JMA = 'https://www.jma.go.jp';
const WXMAP_BASE = `${JMA}/bosai/weather_map/data/png/`;
const NOWC_TILE_TEMPLATE = `${JMA}/bosai/jmatile/data/nowc/{base}/none/{valid}/surf/{element}/{z}/{x}/{y}.png`;

const HIMAWARI_TILE_TEMPLATE = `${JMA}/bosai/himawari/data/satimg/{base}/jp/{valid}/{band}/{prod}/{z}/{x}/{y}.jpg`;
const HIMAWARI_PRODUCTS = {
  visible:{label:'ひまわり可視', band:'B03', prod:'ALBD', pane:'himawariVisPane', zIndex:420},
  cloudTop:{label:'ひまわり雲頂強調', band:'SND', prod:'ETC', pane:'himawariCloudPane', zIndex:430}
};

let mapJapan, mapRegion, charts = {}, rainLayers = [], wxLayers = [], himawariLayers = [], obsLayers = [], nowcTimes = [], wxMaps = [], himawariTimes = [], timeRows = [];
let selectedIndex = 0;
let cloud3d = {renderer:null, scene:null, camera:null, controls:null, mesh:null, texture:null, baseMesh:null, baseTexture:null, lastCanvas:null, lastBaseCanvas:null, lastMosaic:null, lastSat:null, animationId:null};

function fmtTime(d){ return new Intl.DateTimeFormat('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(d); }
function parseJmaUTC(s){ return new Date(Date.UTC(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8), +s.slice(8,10), +s.slice(10,12), +s.slice(12,14))); }
function ymdLocal(d){ const z=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}`; }
function closestByTime(list, t){ if(!list.length) return null; return list.reduce((a,b)=> Math.abs(b.date-t) < Math.abs(a.date-t) ? b : a, list[0]); }

function initMaps(){
  const base = 'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png';
  mapJapan = L.map('mapJapan', {zoomControl:true}).setView([37.5, 137.5], 4); // 初期状態で雨雲レーダーが見えるよう、マイナスを1回押した相当のズーム
  mapRegion = L.map('mapRegion', {zoomControl:true}).setView([REGIONS.kagawa.lat, REGIONS.kagawa.lon], REGIONS.kagawa.zoom);
  [mapJapan, mapRegion].forEach(m => {
    m.createPane('himawariVisPane'); m.getPane('himawariVisPane').style.zIndex = 420; m.getPane('himawariVisPane').classList.add('himawari-vis-pane');
    m.createPane('himawariCloudPane'); m.getPane('himawariCloudPane').style.zIndex = 430; m.getPane('himawariCloudPane').classList.add('himawari-cloud-pane');
    m.createPane('wxPane'); m.getPane('wxPane').style.zIndex = 450; m.getPane('wxPane').classList.add('wx-pane');
    m.createPane('rainNDPane'); m.getPane('rainNDPane').style.zIndex = 740; m.getPane('rainNDPane').classList.add('rain-nd-pane');
    m.createPane('rainPane'); m.getPane('rainPane').style.zIndex = 780; m.getPane('rainPane').classList.add('rain-pane-strong');
    m.createPane('obsPane'); m.getPane('obsPane').style.zIndex = 900;
    L.tileLayer(base, {maxZoom:18, attribution:'地理院タイル'}).addTo(m);
  });
}

async function fetchJson(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error(`${r.status} ${r.statusText}: ${url}`);
  return await r.json();
}

async function loadNowcTimes(){
  const [past, future] = await Promise.all([
    fetchJson(`${JMA}/bosai/jmatile/data/nowc/targetTimes_N1.json`),
    fetchJson(`${JMA}/bosai/jmatile/data/nowc/targetTimes_N2.json`)
  ]);
  const merged = [...past, ...future]
    .filter(x => x.elements?.includes('hrpns'))
    .map(x => ({base:x.basetime, valid:x.validtime, date:parseJmaUTC(x.validtime)}))
    .sort((a,b)=>a.date-b.date);
  const uniq = new Map(merged.map(x => [`${x.base}_${x.valid}`, x]));
  nowcTimes = [...uniq.values()];
  console.log('nowc times', nowcTimes.length, nowcTimes[0], nowcTimes[nowcTimes.length-1]);
}

async function loadWeatherMaps(){
  const list = await fetchJson(`${JMA}/bosai/weather_map/data/list.json`);
  const near = list.near || list;
  const files = [
    ...(near.now || []),
    ...(near.ft24 || []),
    ...(near.ft48 || [])
  ].filter(Boolean);
  wxMaps = files.map(fn => {
    fn = Array.isArray(fn) ? fn[0] : fn;
    const m = String(fn).match(/_(\d{14})_MET/) || String(fn).match(/_(\d{14})_/);
    return {file:fn, date:m ? parseJmaUTC(m[1]) : new Date(0), url: WXMAP_BASE + fn};
  }).sort((a,b)=>a.date-b.date);
  console.log('weather maps', wxMaps.length, wxMaps[0], wxMaps[wxMaps.length-1]);
}


async function loadHimawariTimes(){
  const list = await fetchJson(`${JMA}/bosai/himawari/data/satimg/targetTimes_jp.json`);
  himawariTimes = list
    .map(x => ({base:x.basetime, valid:x.validtime, date:parseJmaUTC(x.validtime)}))
    .sort((a,b)=>a.date-b.date);
  console.log('himawari times', himawariTimes.length, himawariTimes[0], himawariTimes[himawariTimes.length-1]);
}

async function loadWeatherSeries(place){
  // Open-Meteo の JMA MSM/GSM ベースAPI。1日前〜明日までを時間単位で取得。
  const url = new URL('https://api.open-meteo.com/v1/jma');
  url.search = new URLSearchParams({
    latitude:place.lat, longitude:place.lon, timezone:'Asia/Tokyo', past_days:'1', forecast_days:'2',
    hourly:'temperature_2m,relative_humidity_2m,precipitation'
  }).toString();
  const j = await fetchJson(url.toString());
  return j.hourly.time.map((t,i)=>({
    time:t, date:new Date(t), temp:j.hourly.temperature_2m[i], hum:j.hourly.relative_humidity_2m[i], rain:j.hourly.precipitation[i]
  }));
}

function buildChart(canvasId, rows, title){
  const ctx = document.getElementById(canvasId);
  if(charts[canvasId]) charts[canvasId].destroy();
  const markerPlugin = {
    id:'selectedTimeMarker',
    afterDatasetsDraw(chart){
      const meta = chart.getDatasetMeta(0); if(!meta.data[selectedIndex]) return;
      const x = meta.data[selectedIndex].x; const {top,bottom} = chart.chartArea;
      const c = chart.ctx; c.save(); c.setLineDash([5,4]); c.strokeStyle = '#111827'; c.lineWidth = 1.3;
      c.beginPath(); c.moveTo(x, top); c.lineTo(x, bottom); c.stroke(); c.restore();
    }
  };
  charts[canvasId] = new Chart(ctx, {
    type:'line',
    data:{ labels:rows.map(r=>fmtTime(r.date)), datasets:[
      {label:'気温 ℃', data:rows.map(r=>r.temp), yAxisID:'yTemp', borderColor:'#ef4444', backgroundColor:'#ef444433', tension:.25, pointRadius:0, borderWidth:2},
      {label:'湿度 %', data:rows.map(r=>r.hum), yAxisID:'yHum', borderColor:'#2563eb', backgroundColor:'#2563eb22', tension:.25, pointRadius:0, borderWidth:2},
      {label:'降水量 mm/h', data:rows.map(r=>r.rain), yAxisID:'yRain', borderColor:'#0ea5e9', backgroundColor:'#0ea5e944', type:'bar', borderWidth:0}
    ]},
    options:{maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{legend:{position:'bottom'}, title:{display:true,text:title}},
      scales:{x:{ticks:{maxTicksLimit:9}}, yTemp:{position:'left', title:{display:true,text:'℃'}}, yHum:{position:'right', min:0, max:100, grid:{drawOnChartArea:false}, title:{display:true,text:'%'}}, yRain:{position:'right', grid:{drawOnChartArea:false}, title:{display:true,text:'mm/h'}, suggestedMin:0}}
    }, plugins:[markerPlugin]
  });
}

function clearLayerArray(arr){ arr.forEach(l => { try{l.remove();}catch(e){} }); arr.length = 0; }
let radarTileStats = {loaded:0, error:0};

function updateRainPaneStyle(){
  [mapJapan, mapRegion].forEach(m => {
    const p = m.getPane('rainPane');
    if(!p) return;
    p.classList.toggle('rain-pane-strong', document.getElementById('rainEnhance').checked);
  });
}

function getWeatherMapBounds(){
  // 気象庁の近域天気図は通常のWeb地図タイルと投影が一致しないため、
  // 横倍率・縦倍率・東西/南北位置を独立して微調整できるようにします。
  const scaleX = +document.getElementById('wxScaleX').value || 0.70;
  const scaleY = +document.getElementById('wxScaleY').value || 0.70;
  const lonOffset = +document.getElementById('wxLonOffset').value || 0;
  const latOffset = +document.getElementById('wxLatOffset').value || 0;
  const centerLat = 33.5 + latOffset;
  const centerLon = 137.5 + lonOffset;
  const halfLat = (50 - 17) / 2 / scaleY;
  const halfLon = (160 - 115) / 2 / scaleX;
  return [[centerLat - halfLat, centerLon - halfLon], [centerLat + halfLat, centerLon + halfLon]];
}

function updateTuneValueLabels(){
  const ids = ['wxScaleX','wxScaleY','wxLonOffset','wxLatOffset','wxRotate'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    const val = document.getElementById(id + 'Val');
    if(el && val) val.textContent = (+el.value).toFixed(id.includes('Scale') ? 2 : 1);
  });
}

function resetWeatherMapTuning(){
  document.getElementById('wxScaleX').value = 0.70;
  document.getElementById('wxScaleY').value = 0.70;
  document.getElementById('wxLonOffset').value = -1.4;
  document.getElementById('wxLatOffset').value = -2.0;
  document.getElementById('wxRotate').value = 0;
  updateTuneValueLabels();
  updateOverlays();
}

function forceMapAndOverlayRefresh(){
  const maps = [mapJapan, mapRegion].filter(Boolean);
  const refresh = () => {
    maps.forEach(m => m.invalidateSize(true));
    rainLayers.forEach(l => { try{ l.redraw(); }catch(e){} });
    himawariLayers.forEach(l => { try{ l.redraw(); }catch(e){} });
  };
  refresh();
  setTimeout(refresh, 80);
  setTimeout(refresh, 300);
  setTimeout(refresh, 900);
}

function makeNowcTileUrl(time, element){
  return NOWC_TILE_TEMPLATE
    .replace('{base}', time.base)
    .replace('{valid}', time.valid)
    .replace('{element}', element);
}

function addOneRadarLayer(map, time, element, paneName, opacity, zIndex){
  const url = makeNowcTileUrl(time, element);
  const layer = L.tileLayer(url, {
    minZoom:4,
    maxZoom:18,
    maxNativeZoom:10,
    opacity:opacity,
    zIndex:zIndex,
    pane:paneName,
    detectRetina:false,
    keepBuffer:2,
    attribution:'気象庁 雨雲の動き'
  });
  layer.on('tileload', () => { radarTileStats.loaded++; updateDebugLine(); });
  layer.on('tileerror', () => { radarTileStats.error++; updateDebugLine(); });
  layer.addTo(map);
  rainLayers.push(layer);
  setTimeout(() => { try{ layer.redraw(); }catch(e){} }, 60);
}

function addRadar(map, time){
  updateRainPaneStyle();
  const mode = document.getElementById('radarMode').value;
  const rainOpacity = +document.getElementById('rainOpacity').value;

const RotatableImageOverlay = L.ImageOverlay.extend({
  options:{rotationDeg:0},
  _reset:function(){
    L.ImageOverlay.prototype._reset.call(this);
    this._applyRotation();
  },
  _animateZoom:function(e){
    L.ImageOverlay.prototype._animateZoom.call(this, e);
    this._applyRotation();
  },
  _applyRotation:function(){
    if(!this._image) return;
    const deg = this.options.rotationDeg || 0;
    this._image.style.transformOrigin = '50% 50%';
    this._image.style.webkitTransformOrigin = '50% 50%';
    const base = this._image.style.transform || this._image.style.webkitTransform || '';
    const clean = base.replace(/\s*rotate\([^)]*\)/g, '');
    this._image.style.transform = `${clean} rotate(${deg}deg)`;
    this._image.style.webkitTransform = `${clean} rotate(${deg}deg)`;
  }
});

function lonLatToTileXY(lon, lat, z){
  const latRad = lat * Math.PI / 180;
  const n = Math.pow(2, z);
  const x = Math.floor((lon + 180) / 360 * n);
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return {x: Math.max(0, Math.min(n-1, x)), y: Math.max(0, Math.min(n-1, y))};
}

function limitTileRange(minX, maxX, minY, maxY, maxTiles){
  let width = maxX - minX + 1;
  let height = maxY - minY + 1;
  while(width * height > maxTiles){
    if(width >= height && width > 1){ minX++; maxX--; }
    else if(height > 1){ minY++; maxY--; }
    width = maxX - minX + 1;
    height = maxY - minY + 1;
  }
  return {minX, maxX, minY, maxY};
}

function loadImageForCanvas(url){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('画像タイルを読み込めません: ' + url));
    img.src = url;
  });
}

async function buildCloudTopMosaic(sat, map){
  const tileZ = 6; // 気象庁ひまわりJPタイルの標準解像度として扱う
  const b = map.getBounds();
  const nw = lonLatToTileXY(b.getWest(), b.getNorth(), tileZ);
  const se = lonLatToTileXY(b.getEast(), b.getSouth(), tileZ);
  let minX = Math.min(nw.x, se.x), maxX = Math.max(nw.x, se.x);
  let minY = Math.min(nw.y, se.y), maxY = Math.max(nw.y, se.y);
  ({minX, maxX, minY, maxY} = limitTileRange(minX, maxX, minY, maxY, 48));
  const tileSize = 256;
  const canvas = document.createElement('canvas');
  canvas.width = (maxX - minX + 1) * tileSize;
  canvas.height = (maxY - minY + 1) * tileSize;
  const ctx = canvas.getContext('2d');
  let ok = 0, fail = 0;
  const product = HIMAWARI_PRODUCTS.cloudTop;
  for(let y=minY; y<=maxY; y++){
    for(let x=minX; x<=maxX; x++){
      const url = makeHimawariTileUrl(sat, product).replace('{z}', tileZ).replace('{x}', x).replace('{y}', y);
      try{
        const img = await loadImageForCanvas(url);
        ctx.drawImage(img, (x-minX)*tileSize, (y-minY)*tileSize, tileSize, tileSize);
        ok++;
      }catch(e){
        fail++;
      }
    }
  }
  if(ok === 0) throw new Error('雲頂強調画像タイルを取得できませんでした。時刻を変えるか、しばらく待って再読み込みしてください。');
  return {canvas, ok, fail, tileZ, minX, maxX, minY, maxY};
}


async function buildGsiBaseMapMosaic(mosaic){
  // 3D表示の高さ0面に貼る地図です。上のLeaflet地図と同じ地理院淡色地図を、雲頂強調画像と同じタイル範囲で合成します。
  const tileSize = 256;
  const canvas = document.createElement('canvas');
  canvas.width = mosaic.canvas.width;
  canvas.height = mosaic.canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#dbeafe';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  let ok = 0, fail = 0;
  for(let y=mosaic.minY; y<=mosaic.maxY; y++){
    for(let x=mosaic.minX; x<=mosaic.maxX; x++){
      const url = `https://cyberjapandata.gsi.go.jp/xyz/pale/${mosaic.tileZ}/${x}/${y}.png`;
      try{
        const img = await loadImageForCanvas(url);
        ctx.drawImage(img, (x-mosaic.minX)*tileSize, (y-mosaic.minY)*tileSize, tileSize, tileSize);
        ok++;
      }catch(e){
        fail++;
      }
    }
  }
  return {canvas, ok, fail};
}

function colorToCloudHeight(r,g,b){
  // 雲頂強調画像は「色の違い」が雲頂の冷たさ・高さの目安になるので、彩度と明るさを合わせて高さ化します。
  const rn=r/255, gn=g/255, bn=b/255;
  const max=Math.max(rn,gn,bn), min=Math.min(rn,gn,bn);
  const sat = max === 0 ? 0 : (max-min)/max;
  const lum = 0.2126*rn + 0.7152*gn + 0.0722*bn;
  const colorContrast = Math.abs(rn-gn) + Math.abs(gn-bn) + Math.abs(bn-rn);
  let h = sat*0.72 + lum*0.38 + colorContrast*0.18 - 0.18;
  // 黒に近い宇宙・海面・背景は低くする
  if(lum < 0.08) h *= 0.15;
  return Math.max(0, Math.min(1, h));
}

function tileXYToLonLat(x, y, z){
  const n = Math.pow(2, z);
  const lon = x / n * 360 - 180;
  const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * y / n)));
  return {lon, lat: latRad * 180 / Math.PI};
}

function lonLatToGlobalPixel(lon, lat, z){
  const latRad = lat * Math.PI / 180;
  const n = Math.pow(2, z);
  const x = (lon + 180) / 360 * n * 256;
  const y = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n * 256;
  return {x, y};
}

function addJapanOutlineToCloud3d(mosaic, meshWidth, meshDepth, zHeight){
  ensureCloud3dRenderer();
  if(cloud3d.outline){ cloud3d.scene.remove(cloud3d.outline); }
  const group = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({color:0xffff00, linewidth:3, depthTest:false});
  const left = mosaic.minX * 256;
  const top = mosaic.minY * 256;
  const cw = mosaic.canvas.width;
  const ch = mosaic.canvas.height;
  JAPAN_OUTLINES.forEach(poly => {
    const pts = [];
    poly.forEach(([lon,lat]) => {
      const p = lonLatToGlobalPixel(lon, lat, mosaic.tileZ);
      const px = p.x - left;
      const py = p.y - top;
      if(px >= -20 && px <= cw + 20 && py >= -20 && py <= ch + 20){
        const x = (px / cw - 0.5) * meshWidth;
        const y = (0.5 - py / ch) * meshDepth;
        pts.push(new THREE.Vector3(x, y, zHeight));
      }
    });
    if(pts.length >= 2){
      const geom = new THREE.BufferGeometry().setFromPoints(pts);
      const line = new THREE.Line(geom, mat);
      line.renderOrder = 999;
      group.add(line);
    }
  });
  cloud3d.outline = group;
  cloud3d.scene.add(group);
}

function ensureCloud3dRenderer(){
  if(typeof THREE === 'undefined') throw new Error('Three.jsを読み込めませんでした。インターネット接続またはCDNへのアクセスを確認してください。');
  const host = document.getElementById('cloud3dCanvas');
  if(!cloud3d.renderer){
    cloud3d.scene = new THREE.Scene();
    cloud3d.scene.background = new THREE.Color(0xeaf6ff);
    cloud3d.camera = new THREE.PerspectiveCamera(45, host.clientWidth / host.clientHeight, 0.1, 3000);
    cloud3d.camera.position.set(0, -230, 160);
    cloud3d.renderer = new THREE.WebGLRenderer({antialias:true});
    cloud3d.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    cloud3d.renderer.setSize(host.clientWidth, host.clientHeight);
    host.innerHTML = '';
    host.appendChild(cloud3d.renderer.domElement);
    if(!THREE.OrbitControls) throw new Error('OrbitControlsを読み込めませんでした。Three.js examples のCDN読み込みを確認してください。');
    cloud3d.controls = new THREE.OrbitControls(cloud3d.camera, cloud3d.renderer.domElement);
    cloud3d.controls.target.set(0,0,20);
    cloud3d.controls.enableDamping = true;
    const amb = new THREE.AmbientLight(0xffffff, 0.8);
    cloud3d.scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(100,-120,180);
    cloud3d.scene.add(dir);
    const grid = new THREE.GridHelper(240, 24, 0x94a3b8, 0xcbd5e1);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -2;
    cloud3d.scene.add(grid);
    const animate = () => {
      cloud3d.animationId = requestAnimationFrame(animate);
      if(cloud3d.controls) cloud3d.controls.update();
      cloud3d.renderer.render(cloud3d.scene, cloud3d.camera);
    };
    animate();
  }
  resizeCloud3dRenderer();
}

function resizeCloud3dRenderer(){
  if(!cloud3d.renderer) return;
  const host = document.getElementById('cloud3dCanvas');
  const w = host.clientWidth || 800;
  const h = host.clientHeight || 500;
  cloud3d.camera.aspect = w / h;
  cloud3d.camera.updateProjectionMatrix();
  cloud3d.renderer.setSize(w, h);
}

function resetCloud3dView(){

}

function createCloud3dMeshFromCanvas(canvas, mosaic=null, baseCanvas=null){
  ensureCloud3dRenderer();

  if(cloud3d.mesh){
    cloud3d.scene.remove(cloud3d.mesh);
    cloud3d.mesh.geometry.dispose();
    cloud3d.mesh.material.dispose();
  }
  if(cloud3d.baseMesh){
    cloud3d.scene.remove(cloud3d.baseMesh);
    cloud3d.baseMesh.geometry.dispose();
    cloud3d.baseMesh.material.dispose();
  }
  if(cloud3d.texture){ cloud3d.texture.dispose(); }
  if(cloud3d.baseTexture){ cloud3d.baseTexture.dispose(); }

  const res = +document.getElementById('cloud3dResolution').value || 96;
  const heightScale = +document.getElementById('cloud3dHeightScale').value || 55;
  const cloudOpacity = +document.getElementById('cloud3dOpacity').value || 0.68;
  const baseOpacity = +document.getElementById('cloud3dBaseOpacity').value || 1.0;
  const wire = document.getElementById('cloud3dWireToggle').checked;

  const sample = document.createElement('canvas');
  sample.width = res;
  sample.height = res;
  const sctx = sample.getContext('2d');
  sctx.drawImage(canvas, 0, 0, res, res);

  let img;
  try{
    img = sctx.getImageData(0,0,res,res);
  }catch(e){
    throw new Error('ブラウザのCORS制限により画像の画素値を読めませんでした。http://localhost:8000 で開き直してください。それでも出る場合は、気象庁側のCORS設定で3D化だけが制限されています。');
  }

  const aspect = canvas.width / canvas.height;
  const width = 220;
  const depth = width / aspect;

  // 高さ0の地図面
  if(baseCanvas){
    const baseTexCanvas = document.createElement('canvas');
    baseTexCanvas.width = 1024;
    baseTexCanvas.height = 1024;
    baseTexCanvas.getContext('2d').drawImage(baseCanvas, 0, 0, 1024, 1024);
    cloud3d.baseTexture = new THREE.CanvasTexture(baseTexCanvas);
    cloud3d.baseTexture.needsUpdate = true;

    const baseGeom = new THREE.PlaneGeometry(width, depth, 1, 1);
    const baseMat = new THREE.MeshBasicMaterial({
      map: cloud3d.baseTexture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: baseOpacity
    });
    cloud3d.baseMesh = new THREE.Mesh(baseGeom, baseMat);
    cloud3d.baseMesh.position.z = -0.8;
    cloud3d.scene.add(cloud3d.baseMesh);
  }

  // 透過した雲頂強調画像を高さつきメッシュにする
  const texCanvas = document.createElement('canvas');
  texCanvas.width = 1024;
  texCanvas.height = 1024;
  texCanvas.getContext('2d').drawImage(canvas, 0, 0, 1024, 1024);
  cloud3d.texture = new THREE.CanvasTexture(texCanvas);
  cloud3d.texture.needsUpdate = true;

  const geom = new THREE.PlaneGeometry(width, depth, res-1, res-1);
  const pos = geom.attributes.position;
  for(let j=0; j<res; j++){
    for(let i=0; i<res; i++){
      const idx = (j*res + i)*4;
      const r = img.data[idx], g = img.data[idx+1], b = img.data[idx+2];
      const h = colorToCloudHeight(r,g,b) * heightScale;
      const v = j*res + i;
      pos.setZ(v, h);
    }
  }
  geom.computeVertexNormals();

  const mat = new THREE.MeshPhongMaterial({
    map: cloud3d.texture,
    side: THREE.DoubleSide,
    wireframe: wire,
    shininess: 18,
    transparent: !wire,
    opacity: wire ? 1.0 : cloudOpacity,
    depthWrite: wire ? true : false
  });
  cloud3d.mesh = new THREE.Mesh(geom, mat);
  cloud3d.mesh.position.z = 0;
  cloud3d.scene.add(cloud3d.mesh);

  cloud3d.lastCanvas = canvas;
  cloud3d.lastBaseCanvas = baseCanvas;
  cloud3d.lastMosaic = mosaic;
}

async function buildCloud3d(){
  const status = document.getElementById('cloud3dStatus');
  try{
    updateCloud3dLabels();
    const row = timeRows[selectedIndex];
    if(!row) throw new Error('時系列データがまだ読み込まれていません。');
    const sat = closestByTime(himawariTimes, row.date);
    if(!sat) throw new Error('ひまわり時刻データがありません。');
    const map = getCloud3dMap();
    const targetLabel = document.getElementById('cloud3dTarget').value === 'japan' ? '日本全体' : REGIONS[document.getElementById('regionSelect').value].name;
    status.textContent = `3D作成中：${targetLabel} / 衛星 ${fmtTime(sat.date)} の雲頂強調画像タイルを読み込み中...`;
    const mosaic = await buildCloudTopMosaic(sat, map);
    status.textContent = `3D作成中：${targetLabel} / 高さ0の地図タイルを合成中...`;
    const baseMosaic = await buildGsiBaseMapMosaic(mosaic);
    createCloud3dMeshFromCanvas(mosaic.canvas, mosaic, baseMosaic.canvas);
    cloud3d.lastSat = sat;
    document.getElementById('cloud3dHeadStatus').textContent = `${targetLabel} / ${fmtTime(sat.date)} の雲頂強調を3D化`;
    status.textContent = `3D作成完了：${targetLabel} / 衛星 ${fmtTime(sat.date)} / 雲タイル成功 ${mosaic.ok}件・失敗 ${mosaic.fail}件 / 地図タイル成功 ${baseMosaic.ok}件・失敗 ${baseMosaic.fail}件 / タイル範囲 z${mosaic.tileZ} x${mosaic.minX}-${mosaic.maxX} y${mosaic.minY}-${mosaic.maxY}\n操作：ドラッグで回転、ホイールで拡大縮小、右ドラッグで移動。高さ0に地図を貼り、その上に雲頂強調画像を透過メッシュとして重ねています。高さは雲頂強調画像の色を簡易的に数値化したもので、実高度そのものではありません。`;
  }catch(e){
    console.error(e);
    status.textContent = '3D作成に失敗しました：' + e.message;
  }
}

function refreshCloud3dMaterial(){
  if(!cloud3d.lastCanvas) return;
  try{ createCloud3dMeshFromCanvas(cloud3d.lastCanvas, cloud3d.lastMosaic, cloud3d.lastBaseCanvas); }catch(e){ console.error(e); }
}

async function reloadAll(){
  const errorBox = document.getElementById('errorBox'); errorBox.textContent = '';
  document.getElementById('timeSlider').disabled = true;
  try{
    await Promise.all([loadNowcTimes(), loadWeatherMaps(), loadHimawariTimes()]);
    const reg = REGIONS[document.getElementById('regionSelect').value];
    document.getElementById('regionTitle').textContent = reg.name;
    mapRegion.setView([reg.lat, reg.lon], reg.zoom);
    setTimeout(() => { mapJapan.setZoom(4, {animate:false}); mapJapan.invalidateSize(true); mapRegion.invalidateSize(true); }, 0);
    const [jpRows, regRows] = await Promise.all([loadWeatherSeries(JAPAN_POINT), loadWeatherSeries(reg)]);
    timeRows = regRows;
    selectedIndex = Math.min(regRows.findIndex(r => r.date >= new Date()), regRows.length-1);
    if(selectedIndex < 0) selectedIndex = Math.floor(regRows.length/2);
    const slider = document.getElementById('timeSlider'); slider.min = 0; slider.max = regRows.length-1; slider.value = selectedIndex; slider.disabled = false;
    buildChart('chartJapan', jpRows, '日本全土の代表点：東京（1日前〜明日）');
    buildChart('chartRegion', regRows, `${reg.name}（1日前〜明日）`);
    mapJapan.setZoom(4, {animate:false});
    updateOverlays();
  }catch(e){
    console.error(e); errorBox.textContent = 'データ取得に失敗しました。ローカルファイルとして直接開いている場合は、同じフォルダで `python3 -m http.server 8000` を実行し、http://localhost:8000/jma_weather_dashboard.html で開いてください。\n\n' + e.message;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initMaps();
  document.getElementById('timeSlider').addEventListener('input', e => {selectedIndex=+e.target.value; updateOverlays();});
  document.getElementById('regionSelect').addEventListener('change', reloadAll);
  document.getElementById('reloadBtn').addEventListener('click', reloadAll);
  ['rainToggle','chartToggle','himawariVisibleToggle','himawariCloudTopToggle','himawariOpacity','rainOpacity','wxOpacity','wxScaleX','wxScaleY','wxLonOffset','wxLatOffset','wxRotate','rainEnhance','radarMode'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { updateTuneValueLabels(); updateOverlays(); });
  });
  document.getElementById('wxResetBtn').addEventListener('click', resetWeatherMapTuning);
  document.getElementById('buildCloud3dBtn').addEventListener('click', buildCloud3d);
  document.getElementById('resetCloud3dViewBtn').addEventListener('click', resetCloud3dView);
  ['cloud3dHeightScale','cloud3dResolution','cloud3dWireToggle','cloud3dOpacity','cloud3dBaseOpacity','cloud3dTarget'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { updateCloud3dLabels(); if(cloud3d.lastCanvas && id !== 'cloud3dTarget') refreshCloud3dMaterial(); });
  });
  window.addEventListener('resize', () => { forceMapAndOverlayRefresh(); resizeCloud3dRenderer(); });
  window.addEventListener('load', () => setTimeout(forceMapAndOverlayRefresh, 250));
  updateTuneValueLabels();
  updateCloud3dLabels();
  reloadAll();
});
</script>
</body>
</html>
